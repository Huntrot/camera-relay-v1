<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#06090f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Camera Giám Sát — Live View</title>
    <meta name="description" content="Xem camera giám sát xưởng trực tiếp, thời gian thực từ mọi nơi">

    <!-- Preconnect for font performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app" id="app">

    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <header class="header">
        <a class="logo" href="/" title="Camera Monitor">
            <div class="logo-mark">📷</div>
            <div class="logo-text">
                <strong>CamRelay</strong>
                <span>Live Monitor</span>
            </div>
        </a>

        <div id="status-badge" class="status-badge connecting">
            <div class="status-dot" aria-hidden="true"></div>
            <span id="status-text">Đang kết nối…</span>
        </div>
    </header>

    <!-- ── Video Area ──────────────────────────────────────────────────────── -->
    <div class="video-wrap" id="video-wrap">
        <video
            id="video-feed"
            class="video-feed"
            autoplay
            playsinline
            muted
            aria-label="Live camera feed"
        ></video>

        <!-- Loading overlay -->
        <div id="overlay-loading" class="overlay" role="status" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <p class="overlay-title">Đang kết nối camera…</p>
            <p class="overlay-sub">Vui lòng chờ trong giây lát</p>
        </div>

        <!-- Offline overlay -->
        <div id="overlay-offline" class="overlay hidden" role="alert" aria-live="assertive">
            <div class="overlay-icon" aria-hidden="true">📵</div>
            <p class="overlay-title">Camera đang offline</p>
            <p class="overlay-sub">
                Publisher chưa kết nối hoặc đã mất kết nối.<br>
                Hệ thống sẽ tự động thử lại.
            </p>
            <button id="btn-reconnect" class="btn btn-primary" type="button">
                ↺ &nbsp;Kết nối lại ngay
            </button>
        </div>
    </div>

    <!-- ── Info Bar ────────────────────────────────────────────────────────── -->
    <div id="info-bar" class="info-bar hidden" aria-label="Stream information">
        <div class="info-pills">
            <span class="pill pill-live" id="pill-live" aria-label="Live stream indicator">
                ● LIVE
            </span>
            <span class="pill" id="pill-time" aria-label="Current time">
                <span class="pill-icon">🕐</span>
                <span id="info-time">--:--:--</span>
            </span>
            <span class="pill" id="pill-res" aria-label="Video resolution">
                <span class="pill-icon">📐</span>
                <span id="info-resolution">--×--</span>
            </span>
            <span class="pill" id="pill-fps" aria-label="Frames per second">
                <span class="pill-icon">⚡</span>
                <span id="info-fps">-- fps</span>
            </span>
        </div>

        <button id="btn-fullscreen" class="btn-icon" type="button" title="Toàn màn hình (F)">
            ⛶
        </button>
    </div>

</div><!-- /app -->

<script src="viewer.js"></script>
</body>
</html>
